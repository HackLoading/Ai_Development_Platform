apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-gateway
    component: api-gateway
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
        component: api-gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            {{- range $key, $value := .Values.gateway.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: GATEWAY_API_KEY
              value: {{ .Values.gateway.apiKey | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.gateway.logLevel | quote }}
          resources:
            limits:
              memory: {{ .Values.gateway.resources.limits.memory | quote }}
              cpu: {{ .Values.gateway.resources.limits.cpu | quote }}
            requests:
              memory: {{ .Values.gateway.resources.requests.memory | quote }}
              cpu: {{ .Values.gateway.resources.requests.cpu | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
