<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyLlama Chat (vLLM Gateway)</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="title">TinyLlama Chat</div>
        <div class="subtitle">Gateway: <span id="gatewayLabel">http://localhost:8080</span></div>
      </header>

      <div class="layout">
        <aside class="panel">
          <div class="field">
            <label for="gatewayUrl">Gateway URL</label>
            <input id="gatewayUrl" type="text" value="http://localhost:8080" />
          </div>
          <div class="field">
            <label for="apiKey">API Key</label>
            <input id="apiKey" type="password" value="demo-api-key-12345" />
          </div>
          <div class="field">
            <label for="model">Model</label>
            <input id="model" type="text" value="tinyllama" />
          </div>
          <div class="field">
            <label for="maxTokens">Max tokens</label>
            <input id="maxTokens" type="number" value="300" min="1" max="4096" />
          </div>
          <div class="field">
            <label for="temperature">Temperature</label>
            <input id="temperature" type="number" value="0.7" step="0.1" min="0" max="2" />
          </div>
          <div class="actions">
            <button id="clearBtn" class="btn secondary" type="button">Clear</button>
            <button id="stopBtn" class="btn danger" type="button" disabled>Stop</button>
          </div>
          <div class="hint" id="status">Ready.</div>
          <div class="hint small" id="error"></div>
        </aside>

        <main class="chat">
          <div class="messages" id="messages"></div>
          <div class="composer">
            <textarea id="prompt" rows="3" placeholder="Type your message..."></textarea>
            <div class="composer-actions">
              <button id="sendBtn" class="btn primary" type="button">Send</button>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
