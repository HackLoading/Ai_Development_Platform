apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-internal
  namespace: monitoring
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: vllm-server
  namespaceSelector:
    matchNames:
      - ai-platform
  endpoints:
    - port: http
      path: /metrics
      interval: 15s