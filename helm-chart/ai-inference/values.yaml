namespace: ai-platform

vllm:
  enabled: false

gateway:
  image:
    repository: ai-gateway
    tag: v2
    pullPolicy: Never
  port: 8080
  nodePort: 30080
  apiKey: "demo-api-key-12345"
  logLevel: "INFO"
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"
  env:
    # This hostname works reliably inside Minikube pods.
    VLLM_BASE_URL: "http://host.minikube.internal:8000"
