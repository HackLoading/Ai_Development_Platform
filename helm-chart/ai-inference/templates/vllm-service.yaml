{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: {{ .Values.namespace }}
  labels:
    app: vllm-server
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  selector:
    app: vllm-server
  ports:
    - name: http
      port: {{ .Values.vllm.port }}
      targetPort: {{ .Values.vllm.port }}
      protocol: TCP
  type: ClusterIP
{{- end }}
