apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-service
  namespace: {{ .Values.namespace }}
  labels:
    app: ai-gateway
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  selector:
    app: ai-gateway
  ports:
    - name: http
      port: {{ .Values.gateway.port }}
      targetPort: {{ .Values.gateway.port }}
      nodePort: {{ .Values.gateway.nodePort }}
      protocol: TCP
  type: NodePort

